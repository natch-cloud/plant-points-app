<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a1a0a;
    --surface: #112211;
    --surface2: #1a2e1a;
    --border: #2a3f2a;
    --accent: #4ade80;
    --accent2: #86efac;
    --text: #e8f5e8;
    --muted: #7a9a7a;
    --danger: #f87171;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .header { padding: 16px 16px 8px; background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); }
  .today-score .pts { font-size: 26px; font-weight: 600; color: var(--accent); line-height: 1; text-align: right; }
  .today-score .label { font-size: 11px; color: var(--muted); text-align: right; }
  .progress-row { display: flex; gap: 8px; margin-top: 10px; }
  .progress-item { flex: 1; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .fill-green { background: linear-gradient(90deg, #22c55e, #4ade80); }
  .fill-blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 200; }
  .bnav-btn { flex: 1; padding: 10px 4px 14px; background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; }
  .bnav-btn.active { color: var(--accent); }
  .bnav-icon { font-size: 20px; }

  .main { flex: 1; overflow-y: auto; padding: 12px 16px 80px; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; padding: 10px 12px 10px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--surface2); border: none; color: var(--muted); cursor: pointer; font-size: 14px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  .cat-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .cat-chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .chip.active { background: var(--accent); color: #0a1a0a; border-color: var(--accent); font-weight: 600; }

  .plant-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
  .plant-card-header { display: flex; align-items: center; padding: 12px; cursor: pointer; gap: 10px; }
  .plant-emoji { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .plant-info { flex: 1; }
  .plant-name { font-size: 14px; font-weight: 600; }
  .plant-cat { font-size: 11px; color: var(--muted); }
  .plant-pts { font-size: 18px; font-weight: 700; color: var(--accent); }
  .plant-pts span { font-size: 11px; font-weight: 400; color: var(--muted); }
  .expand-arrow { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .expand-arrow.open { transform: rotate(180deg); }

  .serving-picker { padding: 0 12px 12px; border-top: 1px solid var(--border); }
  .serving-portion { font-size: 11px; color: var(--muted); padding: 8px 0 6px; }
  .serving-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
  .serving-btn { padding: 8px 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .serving-btn.selected { background: var(--accent); color: #0a1a0a; border-color: var(--accent); font-weight: 600; }
  .serving-btn .sv-pts { font-size: 14px; font-weight: 700; display: block; }
  .add-btn { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 8px; color: #0a1a0a; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
  .add-btn:active { opacity: 0.8; }

  .section-title { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 10px; color: var(--accent2); }
  .log-empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
  .log-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
  .log-emoji { font-size: 18px; }
  .log-info { flex: 1; }
  .log-name { font-size: 13px; font-weight: 600; }
  .log-time { font-size: 11px; color: var(--muted); }
  .log-pts { font-size: 16px; font-weight: 700; color: var(--accent); }
  .log-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; }
  .repeat-badge { font-size: 10px; background: var(--surface2); color: var(--muted); border-radius: 4px; padding: 1px 5px; margin-left: 4px; }

  .stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-box .sv { font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-box .sl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 16px; }
  .day-col { text-align: center; }
  .day-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .day-bar-wrap { height: 60px; display: flex; align-items: flex-end; justify-content: center; }
  .day-bar { width: 24px; border-radius: 4px 4px 0 0; min-height: 3px; }
  .day-pts-label { font-size: 10px; color: var(--accent); margin-top: 2px; font-weight: 600; }
  .day-col.today .day-label { color: var(--accent); font-weight: 700; }

  .history-day { margin-bottom: 16px; }
  .history-date { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .history-date .h-pts { color: var(--accent); }

  .custom-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-input { flex: 1; padding: 9px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .form-input.small { width: 70px; flex: none; }
  .form-save { padding: 9px 16px; background: var(--accent); border: none; border-radius: 8px; color: #0a1a0a; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

  .saveload { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .saveload-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--accent2); }
  .saveload-desc { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .saveload-btns { display: flex; gap: 8px; margin-bottom: 8px; }
  .sl-btn { flex: 1; padding: 9px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
  .sl-btn.primary { background: var(--accent); color: #0a1a0a; border-color: var(--accent); }
  .sl-btn.secondary { background: var(--surface2); color: var(--text); }
  .sl-textarea { width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: monospace; font-size: 11px; resize: vertical; min-height: 60px; outline: none; }
  .sl-msg { font-size: 12px; margin-top: 6px; padding: 6px 10px; border-radius: 6px; }
  .sl-msg.ok { background: #14532d; color: #4ade80; }
  .sl-msg.err { background: #450a0a; color: #f87171; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0a1a0a; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>

var log = [];
var customPlants = [];
var currentTab = 'log';

function loadData() {
  try { log = JSON.parse(localStorage.getItem('pp-log') || '[]'); } catch(e) { log = []; }
  try { customPlants = JSON.parse(localStorage.getItem('pp-custom') || '[]'); } catch(e) { customPlants = []; }
}
function saveData() {
  localStorage.setItem('pp-log', JSON.stringify(log));
  localStorage.setItem('pp-custom', JSON.stringify(customPlants));
}
function allPlants() { return PLANTS.concat(customPlants); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function todayEntries() { return log.filter(function(e){ return e.date === todayStr(); }); }
function weekDates() {
  var days = [];
  for (var i=6; i>=0; i--) {
    var d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}
function weekEntries() {
  return weekDates().map(function(d){ return {date:d, entries:log.filter(function(e){ return e.date===d; })}; });
}
function weekTotalPts() {
  return weekEntries().reduce(function(s,d){ return s + d.entries.reduce(function(a,e){ return a+e.pts; },0); },0);
}
function weekUniquePlants() {
  var names = {};
  weekEntries().forEach(function(d){ d.entries.forEach(function(e){ names[e.name.toLowerCase()]=1; }); });
  return Object.keys(names).length;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

function fmtPts(n) { return n % 1 === 0 ? n : n.toFixed(1); }

function updateHeader() {
  var te = todayEntries();
  var pts = te.reduce(function(s,e){ return s+e.pts; },0);
  var wpts = weekTotalPts();
  var wuniq = weekUniquePlants();
  document.getElementById('todayPts').textContent = fmtPts(pts);
  document.getElementById('uniqLabel').textContent = wuniq + '/30';
  document.getElementById('weekLabel').textContent = fmtPts(wpts) + '/30';
  document.getElementById('uniqBar').style.width = Math.min(100,(wuniq/30)*100) + '%';
  document.getElementById('weekBar').style.width = Math.min(100,(wpts/30)*100) + '%';
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.bnav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('bnav-' + tab).classList.add('active');
  render();
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  updateHeader();
  var main = document.getElementById('main');
  if (currentTab === 'log') renderLog(main);
  else if (currentTab === 'today') renderToday(main);
  else if (currentTab === 'week') renderWeek(main);
  else if (currentTab === 'history') renderHistory(main);
  else if (currentTab === 'settings') renderSettings(main);
}

function renderLog(main) {
  var plants = allPlants();
  var cats = ['All'];
  plants.forEach(function(p){ if (cats.indexOf(p.cat)===-1) cats.push(p.cat); });
  var filtered = plants;
  if (searchQ) {
    var q = searchQ.toLowerCase();
    filtered = plants.filter(function(p){ return p.name.toLowerCase().indexOf(q)!==-1 || p.cat.toLowerCase().indexOf(q)!==-1; });
  } else if (selectedCat !== 'All') {
    filtered = plants.filter(function(p){ return p.cat === selectedCat; });
  }

  var html = '<div class="search-wrap">'
    + '<span class="search-icon">&#128269;</span>'
    + '<input class="search-input" id="searchInput" placeholder="Search plants..." value="' + esc(searchQ) + '" oninput="onSearch(this.value)"/>'
    + (searchQ ? '<button class="search-clear" onclick="clearSearch()">&#10005;</button>' : '')
    + '</div>'
    + '<div class="cat-chips">'
    + cats.map(function(c){ return '<div class="chip' + (selectedCat===c&&!searchQ?' active':'') + '" onclick="selectCat(\'' + esc(c) + '\')">' + esc(c) + '</div>'; }).join('')
    + '</div>';

  filtered.forEach(function(p) {
    var key = p.name;
    var sv = selectedServing[key] !== undefined ? selectedServing[key] : 1;
    var isOpen = expandedPlant === key;
    html += '<div class="plant-card">'
      + '<div class="plant-card-header" onclick="togglePlant(\'' + esc(key) + '\')">'
      + '<div class="plant-emoji">' + p.emoji + '</div>'
      + '<div class="plant-info"><div class="plant-name">' + esc(p.name) + '</div><div class="plant-cat">' + esc(p.cat) + '</div></div>'
      + '<div class="plant-pts">' + p.pts + '<span>pts</span></div>'
      + '<div class="expand-arrow' + (isOpen?' open':'') + '">&#9662;</div>'
      + '</div>';
    if (isOpen) {
      html += '<div class="serving-picker">'
        + '<div class="serving-portion">&#128207; 1 serving = ' + esc(p.portion) + '</div>'
        + '<div class="serving-grid">'
        + SERVINGS.map(function(s,i){
            var spts = p.pts * s.mult;
            return '<button class="serving-btn' + (sv===i?' selected':'') + '" onclick="selectServing(\'' + esc(p.name) + '\',' + i + ')">'
              + '<span class="sv-pts">' + fmtPts(spts) + '</span>' + s.label + '</button>';
          }).join('')
        + '</div>'
        + '<button class="add-btn" onclick="addEntry(\'' + esc(p.name) + '\',\'' + p.emoji + '\',' + fmtPts(p.pts * SERVINGS[sv].mult) + ',\'' + SERVINGS[sv].label + '\')">Add ' + fmtPts(p.pts * SERVINGS[sv].mult) + ' pts</button>'
        + '</div>';
    }
    html += '</div>';
  });

  if (filtered.length === 0) html += '<div class="log-empty">No plants found &#127807;</div>';
  main.innerHTML = html;
}

function renderToday(main) {
  var entries = todayEntries();
  var html = '<div class="section-title">Today\'s log</div>';
  if (entries.length === 0) {
    html += '<div class="log-empty">Nothing logged yet today.<br>Go to Log to add plants! &#127807;</div>';
  } else {
    var seenNames = {};
    entries.forEach(function(e, i) {
      var n = e.name.toLowerCase();
      seenNames[n] = (seenNames[n] || 0) + 1;
      var isRepeat = seenNames[n] > 1;
      html += '<div class="log-item">'
        + '<div class="log-emoji">' + e.emoji + '</div>'
        + '<div class="log-info"><div class="log-name">' + esc(e.name) + (isRepeat ? '<span class="repeat-badge">repeat</span>' : '') + '</div>'
        + '<div class="log-time">' + e.time + (e.serving ? ' &middot; ' + e.serving : '') + '</div></div>'
        + '<div class="log-pts">+' + fmtPts(e.pts) + '</div>'
        + '<button class="log-del" onclick="deleteEntry(' + i + ')">&#128465;</button>'
        + '</div>';
    });
    var total = entries.reduce(function(s,e){ return s+e.pts; },0);
    var uniq = (function(){ var ns={}; entries.forEach(function(e){ ns[e.name.toLowerCase()]=1; }); return Object.keys(ns).length; })();
    html += '<div class="divider"></div><div class="stat-row">'
      + '<div class="stat-box"><div class="sv">' + fmtPts(total) + '</div><div class="sl">total pts</div></div>'
      + '<div class="stat-box"><div class="sv">' + uniq + '</div><div class="sl">unique plants</div></div>'
      + '<div class="stat-box"><div class="sv">' + entries.length + '</div><div class="sl">servings</div></div>'
      + '</div>';
  }
  main.innerHTML = html;
}

function renderWeek(main) {
  var days = weekEntries();
  var maxPts = 1;
  days.forEach(function(d){ var p=d.entries.reduce(function(s,e){ return s+e.pts; },0); if(p>maxPts) maxPts=p; });
  var today = todayStr();
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var wpts = weekTotalPts();
  var wuniq = weekUniquePlants();

  var html = '<div class="section-title">This week</div>'
    + '<div class="stat-row">'
    + '<div class="stat-box"><div class="sv">' + fmtPts(wpts) + '</div><div class="sl">weekly pts</div></div>'
    + '<div class="stat-box"><div class="sv">' + wuniq + '</div><div class="sl">unique plants</div></div>'
    + '</div><div class="week-grid">';

  days.forEach(function(d) {
    var pts = d.entries.reduce(function(s,e){ return s+e.pts; },0);
    var pct = (pts / maxPts) * 100;
    var isToday = d.date === today;
    var dow = new Date(d.date + 'T12:00:00').getDay();
    var color = pts >= 5 ? '#4ade80' : pts >= 2 ? '#86efac' : '#2a3f2a';
    html += '<div class="day-col' + (isToday?' today':'') + '">'
      + '<div class="day-label">' + dayNames[dow] + '</div>'
      + '<div class="day-bar-wrap"><div class="day-bar" style="height:' + Math.max(4,pct) + '%;background:' + color + '"></div></div>'
      + '<div class="day-pts-label">' + (pts > 0 ? fmtPts(pts) : '') + '</div>'
      + '</div>';
  });

  html += '</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px">'
    + '<div style="font-size:13px;color:var(--muted);margin-bottom:8px">Weekly goal progress</div>'
    + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px"><span>&#11088; Points</span><span>' + fmtPts(wpts) + ' / 30</span></div>'
    + '<div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill fill-green" style="width:' + Math.min(100,(wpts/30)*100) + '%"></div></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px"><span>&#127807; Unique plants</span><span>' + wuniq + ' / 30</span></div>'
    + '<div class="progress-bar"><div class="progress-fill fill-blue" style="width:' + Math.min(100,(wuniq/30)*100) + '%"></div></div>'
    + '</div>';

  main.innerHTML = html;
}

function renderHistory(main) {
  var byDate = {};
  log.forEach(function(e){ if (!byDate[e.date]) byDate[e.date]=[]; byDate[e.date].push(e); });
  var dates = Object.keys(byDate).sort().reverse();
  var html = '<div class="section-title">History</div>';
  if (dates.length === 0) {
    html += '<div class="log-empty">No history yet &#128197;</div>';
  } else {
    dates.forEach(function(date) {
      var entries = byDate[date];
      var pts = entries.reduce(function(s,e){ return s+e.pts; },0);
      var uniq = (function(){ var ns={}; entries.forEach(function(e){ ns[e.name.toLowerCase()]=1; }); return Object.keys(ns).length; })();
      var d = new Date(date + 'T12:00:00');
      var label = d.toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short'});
      html += '<div class="history-day"><div class="history-date"><span>' + label + '</span><span class="h-pts">' + fmtPts(pts) + ' pts &middot; ' + uniq + ' plants</span></div>'
        + entries.map(function(e){ return '<div class="log-item" style="margin-bottom:4px"><div class="log-emoji">' + e.emoji + '</div><div class="log-info"><div class="log-name">' + esc(e.name) + '</div><div class="log-time">' + e.time + (e.serving?' &middot; '+e.serving:'') + '</div></div><div class="log-pts">+' + fmtPts(e.pts) + '</div></div>'; }).join('')
        + '</div>';
    });
  }
  main.innerHTML = html;
}

function renderSettings(main) {
  var html = '<div class="section-title">Add custom plant</div>'
    + '<div class="custom-form">'
    + '<div class="form-row"><input class="form-input small" id="cf-emoji" placeholder="&#127807;" maxlength="4"/><input class="form-input" id="cf-name" placeholder="Plant name"/><input class="form-input small" id="cf-pts" placeholder="pts" type="number" step="0.5" min="0.5"/></div>'
    + '<div class="form-row"><input class="form-input" id="cf-portion" placeholder="Portion (e.g. 80g)"/><button class="form-save" onclick="addCustomPlant()">Add</button></div>'
    + '</div>';

  if (customPlants.length > 0) {
    html += '<div class="section-title">My plants</div>';
    customPlants.forEach(function(p,i){
      html += '<div class="log-item"><div class="log-emoji">' + p.emoji + '</div><div class="log-info"><div class="log-name">' + esc(p.name) + '</div><div class="log-time">Custom</div></div><div class="log-pts">' + p.pts + 'pts</div><button class="log-del" onclick="deleteCustomPlant(' + i + ')">&#128465;</button></div>';
    });
    html += '<div class="divider"></div>';
  }

  html += '<div class="section-title">Save &amp; restore data</div>'
    + '<div class="saveload">'
    + '<div class="saveload-title">Backup your data</div>'
    + '<div class="saveload-desc">Copy your data code to save it. Paste it back to restore on a new device.</div>'
    + '<div class="saveload-btns">'
    + '<button class="sl-btn primary" onclick="saveCode()">&#128203; Copy code</button>'
    + '<button class="sl-btn secondary" onclick="showLoadBox()">&#128229; Load code</button>'
    + '</div>'
    + '<div id="load-box" style="display:none"><textarea class="sl-textarea" id="load-input" placeholder="Paste your backup code here..."></textarea><button class="sl-btn primary" style="width:100%;margin-top:6px" onclick="loadCode()">Restore</button></div>'
    + '<div id="sl-msg"></div>'
    + '</div>'
    + '<div class="saveload" style="border-color:var(--danger)">'
    + '<div class="saveload-title" style="color:var(--danger)">Clear all data</div>'
    + '<div class="saveload-desc">This will delete your entire log. Cannot be undone.</div>'
    + '<button class="sl-btn secondary" style="color:var(--danger);border-color:var(--danger)" onclick="clearAll()">&#128465; Clear all data</button>'
    + '</div>';

  main.innerHTML = html;
}

function onSearch(v) { searchQ = v; selectedCat = 'All'; render(); }
function clearSearch() { searchQ = ''; selectedCat = 'All'; render(); }
function selectCat(cat) { selectedCat = cat; searchQ = ''; render(); }
function togglePlant(name) {
  expandedPlant = expandedPlant === name ? null : name;
  if (expandedPlant && selectedServing[name] === undefined) selectedServing[name] = 1;
  render();
}
function selectServing(name, idx) { selectedServing[name] = idx; render(); }
function addEntry(name, emoji, pts, serving) {
  var now = new Date();
  var time = now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  log.push({name:name, emoji:emoji, pts:Number(pts), date:todayStr(), time:time, serving:serving});
  saveData();
  expandedPlant = null;
  showToast('+' + fmtPts(pts) + ' pts for ' + name + '!');
  render();
}
function deleteEntry(idx) {
  var te = todayEntries();
  var entry = te[idx];
  var gi = log.indexOf(entry);
  if (gi !== -1) { log.splice(gi,1); saveData(); render(); }
}
function addCustomPlant() {
  var emoji = document.getElementById('cf-emoji').value.trim() || '🌿';
  var name = document.getElementById('cf-name').value.trim();
  var pts = parseFloat(document.getElementById('cf-pts').value) || 1.0;
  var portion = document.getElementById('cf-portion').value.trim() || '1 serving';
  if (!name) { showToast('Please enter a plant name'); return; }
  customPlants.push({name:name, emoji:emoji, pts:pts, cat:'Custom', portion:portion});
  saveData();
  showToast(name + ' added!');
  render();
}
function deleteCustomPlant(idx) { customPlants.splice(idx,1); saveData(); render(); }
function saveCode() {
  var code = btoa(JSON.stringify({log:log, customPlants:customPlants, savedAt:new Date().toISOString(), v:1}));
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function(){ showToast('Code copied!'); }).catch(function(){ fallbackCopy(code); });
  } else { fallbackCopy(code); }
}
function fallbackCopy(code) {
  var msg = document.getElementById('sl-msg');
  if (msg) { msg.className='sl-msg ok'; msg.textContent='Your code: ' + code; }
}
function showLoadBox() {
  var box = document.getElementById('load-box');
  if (box) box.style.display = box.style.display==='none' ? 'block' : 'none';
}
function loadCode() {
  var code = document.getElementById('load-input').value.trim();
  var msg = document.getElementById('sl-msg');
  try {
    var data = JSON.parse(atob(code));
    if (data.log) log = data.log;
    if (data.customPlants) customPlants = data.customPlants;
    saveData();
    msg.className='sl-msg ok'; msg.textContent='Data restored!';
    setTimeout(function(){ render(); }, 800);
  } catch(e) {
    msg.className='sl-msg err'; msg.textContent='Invalid code. Please try again.';
  }
}
function clearAll() {
  if (confirm('Delete all your plant data? This cannot be undone.')) {
    log=[]; customPlants=[]; saveData(); showToast('All data cleared'); render();
  }
}

loadData();
render();
</script>
</body>
</html>
